name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.in

      - name: Lint
        run: |
          python -m ruff check apps/api workers/copy_engine packages/domain packages/exchange_adapters packages/shared_events infra/migrations

      - name: Test
        run: |
          python -m pytest -p no:cacheprovider

      - name: Alembic head sanity
        run: |
          python -m alembic heads

      - name: Secret pattern sanity
        run: |
          ! grep -RInE "sk-[A-Za-z0-9_-]{20,}|BEGIN (RSA|OPENSSH|PRIVATE)|api[_-]?key\\s*=|secret\\s*=|password\\s*=" \
            --exclude-dir=.git \
            --exclude-dir=.venv \
            --exclude-dir=legacy \
            .
