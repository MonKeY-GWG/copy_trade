name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.in

      - name: Lint
        run: |
          python -m ruff check apps/api workers/copy_engine packages/domain packages/exchange_adapters packages/shared_events infra/migrations

      - name: Test
        run: |
          python -m pytest -p no:cacheprovider

      - name: Alembic head sanity
        run: |
          python -m alembic heads

      - name: Secret pattern sanity
        shell: bash
        run: |
          ! grep -RInE "sk-[A-Za-z0-9_-]{20,}|BEGIN (RSA|OPENSSH|PRIVATE)" \
            --exclude-dir=.git \
            --exclude-dir=.venv \
            --exclude-dir=node_modules \
            --exclude-dir=legacy \
            .
          ! grep -RInE "(^|[^A-Za-z0-9_])(api[_-]?key|secret|password)[[:space:]]*=[[:space:]]*['\"][^'\"]{12,}['\"]" \
            --exclude-dir=.git \
            --exclude-dir=.venv \
            --exclude-dir=node_modules \
            --exclude-dir=legacy \
            --exclude-dir=tests \
            --exclude='*.md' \
            .

  web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Web typecheck
        working-directory: apps/web
        run: npm run typecheck

      - name: Web audit
        working-directory: apps/web
        run: npm audit --audit-level=moderate

      - name: Web build
        working-directory: apps/web
        run: npm run build

      - name: Web E2E smoke
        working-directory: apps/web
        run: npm run test:e2e
